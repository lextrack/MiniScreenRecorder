<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Mini Screen Recorder">
    <meta name="author" content="Lextrack">
    <title>
        Mini Screen Recorder v1.0.1
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" 
    crossorigin="anonymous">
    <link rel="icon" href="images/icono.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/main.css"/>
    <script src="https://code.jquery.com/jquery-3.7.0.slim.js" integrity="sha256-7GO+jepT9gJe9LB4XFf8snVOjX3iYNb0FHYr5LI1N5c=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
</head>

<body>
    <div class="container mt-3 d-flex justify-content-center align-items-center flex-column">
        <a id="download" style="display: none;" href="#" class="btn btn-outline-primary btn-normal btn-download mb-3"><i class="bi bi-download"></i> Download</a>
        <div id="downloadAlert" class="alert alert-warning d-none" role="alert">
            The video was saved in your Downloads folder.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <button type="button" onclick="recordScreenWithAudioMicandDesk()" class="btn btn-outline-primary btn-normal bi bi-record-circle-fill"> Record screen with mic & system audio</button>
        <button type="button" onclick="recordScreenWithAudioDesk()" class="btn btn-outline-success btn-normal bi bi-record-circle-fill"> Record screen only using desktop audio</button>
        <button type="button" class="btn btn-outline-danger btn-stop bi bi-stop-circle-fill d-none" id="stop" disabled> Stop recording</button>
    <!-- <button type="button" onclick="recordAudioMic()" class="btn btn-outline-warning btn-normal bi bi-mic-fill"> Record microphone audio only</button> -->
    <div id="stopwatch" class="d-none">
        <span id="minutes">00</span>:<span id="seconds">00</span>
    </div>
    <div class="pt-2 video-container">
        <video autoplay width="640" height='360' muted></video>
    </div>
    </div>
    <footer>
        <div class="container pt-5">
            &copy; Copyright © 2023 - Lextrack
    </footer>
</body>
<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>

</html>
